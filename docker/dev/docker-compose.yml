name: next16-dev

services:
  app:
    build:
      context: ./../..
      dockerfile: docker/dev/Dockerfile
    ports:
      - '3000:3000'
    volumes:
      - ./../..:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3
